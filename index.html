<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>循環數據平台 | 碼上循環實驗室</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1F5F46;     /* 企業綠 */
            --primary-light: #E8F5E9;
            --secondary: #4CAF50;   /* 亮綠色(進度條等) */
            --bg: #F4F7F6;          /* 淺灰底色 */
            --card: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            /* 模擬手機版置中 (適用於電腦上看時) */
            display: flex;
            justify-content: center;
        }

        /* 手機版容器限制 */
        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--bg);
            padding: 20px;
            padding-bottom: 80px; /* 留給下方可能的選單空間 */
        }

        /* 共用卡片樣式 */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid var(--border);
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 1. 頂部個人資訊 */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--primary);
            font-weight: bold;
        }
        .user-info .name { font-size: 20px; font-weight: 700; }
        .user-info .level { 
            font-size: 13px; 
            color: var(--primary);
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 4px;
            font-weight: 500;
        }

        /* 2. 環境影響力 (爆點) */
        .impact-banner {
            background: var(--primary);
            color: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .impact-banner span { font-size: 13px; opacity: 0.9; }
        .impact-banner h3 { font-size: 18px; margin-top: 4px; font-weight: 700; }

        /* 3. 核心數據 Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .stat-box {
            text-align: center;
            padding: 12px 8px;
            background: #F9FAFB;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 4. 核心按鈕 (CTA) */
        .action-area {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(31, 95, 70, 0.2); }
        .btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }

        /* 5. 任務系統 */
        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .task-item:last-child { border-bottom: none; padding-bottom: 0; }
        .task-info .task-name { font-size: 14px; font-weight: 500; }
        .task-info .task-reward { font-size: 12px; color: var(--text-muted); margin-top: 4px;}
        .task-action .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 8px;
            background: var(--primary-light);
            color: var(--primary);
            border: none;
            font-weight: 600;
        }
        .task-action .btn-done { background: #E5E7EB; color: #9CA3AF; }

        /* 進度條 */
        .progress-container { margin-top: 10px; }
        .progress-bar {
            height: 6px;
            background: #E5E7EB;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 6px;
        }
        .progress-fill {
            height: 100%;
            background: var(--secondary);
            width: 0%; /* 透過 JS 觸發動畫 */
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 6. 排行榜 */
        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .leaderboard-item:last-child { border-bottom: none; padding-bottom: 0; }
        .rank-num { font-weight: 700; width: 24px; color: var(--text-muted); }
        .rank-top1 { color: #F59E0B; } /* 金色 */
        .rank-top2 { color: #9CA3AF; } /* 銀色 */
        .rank-top3 { color: #B45309; } /* 銅色 */
        .rank-name { flex: 1; font-size: 14px; margin-left: 8px; }
        .rank-score { font-size: 14px; font-weight: 700; color: var(--primary); }

    </style>
</head>
<body>

<div class="app-container">

    <div class="profile-header">
        <div class="avatar">杜</div>
        <div class="user-info">
            <div class="name">杜政原</div>
            <div class="level">助理研究員 (Lv.2)</div>
        </div>
    </div>

    <div class="impact-banner">
        <span>您的永續行動，已相當於</span>
        <h3>🌳 2.5 棵樹一天的碳吸收量</h3>
    </div>

    <div class="card">
        <div class="section-title">循環數據總覽</div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value">580g</div>
                <div class="stat-label">累積減碳量</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">12次</div>
                <div class="stat-label">高效循環</div>
            </div>
            <div class="stat-box">
                <div class="stat-value">2張</div>
                <div class="stat-label">可用回饋</div>
            </div>
        </div>
        
        <div class="progress-container">
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);">
                <span>升級進度：研究員</span>
                <span>580 / 1000g</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="level-progress"></div>
            </div>
        </div>
    </div>

    <div class="action-area">
        <button class="btn btn-primary" onclick="alert('開啟相機掃描格外品/循環容器條碼')">📷 掃描容器紀錄</button>
        <button class="btn btn-outline" onclick="alert('產生專屬永續行為分析報告')">📊 永續行為分析報告</button>
    </div>

    <div class="card">
        <div class="section-title">今日研究任務</div>
        <div class="task-item">
            <div class="task-info">
                <div class="task-name">自備環保杯購買飲品</div>
                <div class="task-reward">獎勵：+45g 減碳量</div>
            </div>
            <div class="task-action">
                <button class="btn-small">去完成</button>
            </div>
        </div>
        <div class="task-item">
            <div class="task-info">
                <div class="task-name">選擇格外品調飲 (1/1)</div>
                <div class="task-reward">獎勵：10元 折扣券</div>
            </div>
            <div class="task-action">
                <button class="btn-small btn-done">已領取</button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title">校園減碳排行榜</div>
        <div class="leaderboard-item">
            <div class="rank-num rank-top1">1</div>
            <div class="avatar" style="width: 32px; height: 32px; font-size: 14px;">林</div>
            <div class="rank-name">林同學 (高科大)</div>
            <div class="rank-score">1,250g</div>
        </div>
        <div class="leaderboard-item">
            <div class="rank-num rank-top2">2</div>
            <div class="avatar" style="width: 32px; height: 32px; font-size: 14px;">陳</div>
            <div class="rank-name">陳同學 (高大)</div>
            <div class="rank-score">980g</div>
        </div>
        <div class="leaderboard-item" style="background: #F0FDF4; margin: -10px -20px; padding: 10px 20px; border-radius: 8px;">
            <div class="rank-num">15</div>
            <div class="avatar" style="width: 32px; height: 32px; font-size: 14px;">杜</div>
            <div class="rank-name" style="font-weight: 700; color: var(--primary);">杜政原 (你)</div>
            <div class="rank-score">580g</div>
        </div>
    </div>

</div>

<script>
    // 簡單的進度條動畫：頁面載入後延遲觸發，製造視覺回饋感
    window.onload = function() {
        setTimeout(() => {
            document.getElementById('level-progress').style.width = '58%';
        }, 300);
    };
</script>

</body>
</html>
