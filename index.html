<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>★碼上循環實驗室★</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2C7A4B;
            --gradient-green: linear-gradient(135deg, #2C7A4B 0%, #48BB78 100%);
            --light-green: #E8F5E9;
            --accent-orange: #E65100;
            --text-dark: #2D3748;
            --text-gray: #718096;
            --bg-color: #F7FAFC;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.06);
            --gold-accent: #ffb100;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-dark); line-height: 1.5; padding-bottom: 60px; position: relative; }
        
        .header-bg { background: var(--gradient-green); height: 220px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; position: absolute; top: 0; left: 0; right: 0; z-index: -1; box-shadow: 0 4px 15px rgba(44,122,75,0.2); overflow: hidden; }
        .header-title { color: var(--gold-accent); text-align: center; font-size: 20px; font-weight: 700; padding-top: 25px; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.15); position: relative; z-index: 10; }
        .container { max-width: 480px; margin: 40px auto 0; padding: 0 20px; position: relative; z-index: 10; }
        .profile-card { background: white; border-radius: 20px; padding: 30px 20px 20px; text-align: center; box-shadow: var(--card-shadow); margin-bottom: 20px; position: relative; }
        .profile-pic-wrapper { width: 90px; height: 90px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; margin: -60px auto 10px; background: white; }
        #profile-picture { width: 100%; height: 100%; object-fit: cover; display: none; }
        #profile-name { font-size: 22px; font-weight: 700; color: var(--text-dark); margin-bottom: 2px; }
        .badge-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .level-badge { display: inline-flex; align-items: center; gap: 5px; background-color: var(--light-green); color: var(--primary-green); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
        .leaderboard-btn { display: inline-flex; align-items: center; gap: 5px; background: linear-gradient(135deg, #FFD700, #FFA500); color: white; border: none; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(255,165,0,0.3); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #F8FAFC; padding: 15px 5px; border-radius: 16px; text-align: center; border: 1px solid #EDF2F7; cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; }
        .stat-icon-wrapper { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; margin: 0 auto 8px; background: var(--light-green); color: var(--primary-green); border-radius: 10px; }
        .stat-icon-wrapper svg { width: 22px; height: 22px; }
        .stat-value { font-size: 22px; font-weight: 800; color: var(--primary-green); line-height: 1.2; }
        .stat-label { font-size: 12px; color: var(--text-gray); font-weight: 600; margin-top: 4px;}
        
        .progress-container { text-align: left; background: #F8FAFC; padding: 15px; border-radius: 16px; margin-bottom: 15px;}
        .progress-labels { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; font-weight: 700; color: var(--text-dark); }
        .progress-bar-bg { background: #E2E8F0; height: 10px; border-radius: 10px; overflow: hidden; position: relative; }
        .progress-bar-fill { background: var(--gradient-green); height: 100%; width: 0%; transition: width 0.8s ease-in-out; border-radius: 10px; }
        
        .history-container { text-align: left; border-top: 1.5px dashed #E2E8F0; padding-top: 15px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .history-title { font-size: 14px; font-weight: 700; color: var(--text-dark); display: flex; align-items: center; gap: 6px;}
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; }
        .history-date { color: var(--text-gray); font-size: 11px; min-width: 75px; font-weight: 600; margin-top: 2px;}
        .history-desc { color: var(--primary-green); font-weight: 600; line-height: 1.4;}
        
        /* 機器人 AI 按鈕 (NEW) */
        .ai-report-btn { background: linear-gradient(135deg, #805AD5 0%, #B794F4 100%); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 10px rgba(128,90,213,0.3); display: flex; align-items: center; justify-content: center; gap: 8px;}
        .ai-report-btn:active { transform: scale(0.98); }
        
        .map-explore-btn { background: white; color: var(--text-dark); border: 2px solid #EDF2F7; width: 100%; padding: 14px; border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; transition: all 0.2s;}
        .scan-btn { background: var(--gradient-green); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 15px rgba(44,122,75,0.3); display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px;}

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: white; width: 90%; max-width: 360px; border-radius: 24px; padding: 25px 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #edf2f7; padding-bottom: 15px;}
        .modal-header h3 { color: var(--primary-green); font-size: 18px; margin: 0; display: flex; align-items: center; gap: 8px;}
        .close-icon-btn { background: none; border: none; font-size: 24px; color: var(--text-gray); cursor: pointer; }
        .primary-btn { color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.2s;}

        .ai-report-text { text-align: left; font-size: 14px; color: var(--text-dark); background: #F3EBFF; border: 1px solid #D6BCFA; padding: 15px; border-radius: 12px; line-height: 1.6; margin-top: 10px; font-weight: 600;}

        #loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 45px; height: 45px; border: 4px solid #EDF2F7; border-top: 4px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .rank-list { text-align: left; display: flex; flex-direction: column; gap: 12px; }
        .rank-item { display: flex; align-items: center; padding: 12px; border-radius: 12px; background: #f8fafc; border-left: 4px solid #cbd5e0; }
        .rank-item.active { background: var(--light-green); border-left-color: var(--primary-green); box-shadow: 0 2px 8px rgba(44,122,75,0.1); }
        .rank-info { flex-grow: 1; margin-left: 10px; }
        .rank-name { font-weight: 700; font-size: 15px; color: var(--text-dark); }
        .rank-req { font-size: 12px; color: var(--text-gray); }
        
        .coupon-empty { padding: 30px 0; color: var(--text-gray); font-size: 14px; font-weight: 600; }
        .coupon-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .coupon-card { background: linear-gradient(135deg, #FF9800 0%, #E65100 100%); color: white; border-radius: 12px; padding: 15px; display: flex; align-items: center; justify-content: space-between; text-align: left; box-shadow: 0 4px 10px rgba(230,81,0,0.2); position: relative; overflow: hidden; }
        .coupon-name { font-size: 16px; font-weight: 700; }
        .coupon-desc { font-size: 12px; opacity: 0.9; }
        .coupon-use-btn { background: white; color: #E65100; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.2s;}

        .pin-input { font-size: 24px; letter-spacing: 8px; text-align: center; width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #CBD5E0; margin: 15px 0; font-weight: bold; color: var(--primary-green);}
        
        .store-list { display: flex; flex-direction: column; gap: 12px; text-align: left; }
        .store-card { background: #F8FAFC; border: 1px solid #EDF2F7; border-radius: 16px; padding: 15px; position: relative; }
        .store-badge { position: absolute; top: 15px; right: 15px; background: #E8F5E9; color: #2C7A4B; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 8px; }
        .store-name { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; display: flex; align-items: center; gap: 5px;}
        .store-location { font-size: 12px; color: var(--text-gray); margin-bottom: 8px; display: flex; align-items: center; gap: 4px;}
        .store-promo { font-size: 12px; color: #E65100; font-weight: 600; background: #FFF3E0; display: inline-block; padding: 4px 8px; border-radius: 6px; }
        .sync-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2D3748; color: white; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.3s; z-index: 100000; pointer-events: none;}
        .carbon-hero { font-size: 36px; font-weight: 800; color: var(--primary-green); margin-bottom: 5px; }
        .carbon-hero span { font-size: 16px; font-weight: 600; color: var(--text-gray); }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="spinner"></div><p style="color: #2C7A4B; font-weight: 600; font-size: 15px;" id="loading-text">資料載入中...</p></div>
    <div id="sync-toast" class="sync-toast">☁️ 資料已同步至雲端實驗室</div>
    
    <div class="header-bg"></div>
    <div class="header-title">🌱★碼上循環實驗室★🌱</div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-pic-wrapper"><img id="profile-picture" alt="User" src=""></div>
            <h2 id="profile-name">訪客研究員</h2>
            <div class="badge-row">
                <div class="level-badge" id="member-level">🎓 助理研究員</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box" onclick="openModal('exp-modal')">
                    <div class="stat-icon-wrapper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg></div>
                    <div class="stat-value" id="exp-count">0</div>
                    <div class="stat-label">EXP次數</div>
                </div>
                <div class="stat-box" onclick="openModal('carbon-modal')">
                    <div class="stat-icon-wrapper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></svg></div>
                    <div class="stat-value" id="carbon-saved">0</div>
                    <div class="stat-label">減碳 (g)</div>
                </div>
                <div class="stat-box" onclick="openModal('coupon-modal')">
                    <div class="stat-icon-wrapper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg></div>
                    <div class="stat-value" id="coupon-count">0</div>
                    <div class="stat-label">可用優惠</div>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-labels"><span>升級進度</span><span id="next-level-target">還差 3 次</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-bar"></div></div>
            </div>

            <div class="history-container">
                <div class="history-header">
                    <div class="history-title">實驗紀錄摘要</div>
                </div>
                <div class="history-list" id="history-list"></div>
                
                <button class="ai-report-btn" onclick="generateAIReport()">
                    🤖 產生 Gemini 專屬學術評估報告
                </button>
            </div>
        </div>

        <button class="map-explore-btn" onclick="openModal('map-modal')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            探索周邊特約實驗室
        </button>

        <button class="scan-btn" id="manual-scan-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3h5v5H4z"/><path d="M15 3h5v5h-5z"/><path d="M15 16h5v5h-5z"/><path d="M4 16h5v5H4z"/><path d="M9 3v5"/><path d="M9 16v5"/><path d="M15 3v5"/><path d="M15 16v5"/></svg>
            按我掃描，挑戰 UR 級大爆擊！
        </button>
    </div>

    <div class="modal-overlay" id="ai-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="color: #805AD5;">🤖 碼上循環 AI 教授</h3>
                <button class="close-icon-btn" onclick="closeModal('ai-modal')">&times;</button>
            </div>
            <div style="font-size: 50px;">👨‍🔬</div>
            <div class="ai-report-text" id="ai-report-content">正在為您撰寫學術減碳報告...</div>
            <button class="primary-btn" style="background: #805AD5;" onclick="closeModal('ai-modal')">確認報告並收下</button>
        </div>
    </div>

    <div class="modal-overlay" id="scanner-modal" style="background: rgba(0,0,0,0.9);">
        <div style="width: 90%; max-width: 400px; text-align: center;">
            <div style="color: white; font-size: 20px; font-weight: 700; margin-bottom: 20px;">請對準杯身 QR Code 掃描</div>
            <div id="reader" style="width: 100%; border-radius: 16px; overflow: hidden; border: 3px solid var(--primary-green); background: #000; min-height: 250px;"></div>
            <button class="primary-btn" style="background: #E53E3E; margin-top: 30px;" onclick="closeScanner()">取消掃描</button>
        </div>
    </div>

    <div class="modal-overlay" id="result-modal">
        <div class="modal-content" style="max-width: 300px;">
            <div id="result-icon" style="font-size: 60px; margin-bottom: 5px;">🌱</div>
            <h3 id="result-title" style="margin-bottom: 10px; font-size: 22px;">掃描成功</h3>
            <p id="result-desc" style="font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 15px;"></p>
            <button class="primary-btn" id="result-btn" onclick="closeModal('result-modal')">太棒了，收下！</button>
            <button class="primary-btn" id="share-btn" style="background: #06C755; margin-top: 10px;" onclick="shareToLine()">向 LINE 好友炫耀 (+50g)</button>
        </div>
    </div>

    <div class="modal-overlay" id="verify-modal"><div class="modal-content" style="max-width: 300px;"><h3 style="color: var(--accent-orange); margin-bottom: 10px;">⚠️ 店員核銷專區</h3><input type="number" id="store-pin" class="pin-input" placeholder="輸入4碼" pattern="[0-9]*" inputmode="numeric"><button class="primary-btn" style="background: var(--accent-orange);" onclick="confirmVerification()">確認核銷</button><button class="primary-btn" style="background: #E2E8F0; color: #4A5568;" onclick="closeModal('verify-modal')">取消</button></div></div>
    <div class="modal-overlay" id="exp-modal"><div class="modal-content"><div class="modal-header"><h3>階級路線圖</h3><button class="close-icon-btn" onclick="closeModal('exp-modal')">&times;</button></div><div class="rank-list" id="rank-list-ui"></div></div></div>
    <div class="modal-overlay" id="coupon-modal"><div class="modal-content"><div class="modal-header"><h3>我的專屬票夾</h3><button class="close-icon-btn" onclick="closeModal('coupon-modal')">&times;</button></div><div id="coupon-list-ui"></div></div></div>
    <div class="modal-overlay" id="carbon-modal"><div class="modal-content"><div class="modal-header"><h3>我的永續足跡</h3><button class="close-icon-btn" onclick="closeModal('carbon-modal')">&times;</button></div><div class="carbon-hero" id="modal-carbon-val">0 <span>g</span></div></div></div>
    
    <div class="modal-overlay" id="map-modal">
        <div class="modal-content" style="background: #F7FAFC;">
            <div class="modal-header"><h3>合作實驗室地圖</h3><button class="close-icon-btn" onclick="closeModal('map-modal')">&times;</button></div>
            <div class="store-list">
                <div class="store-card"><div class="store-badge">🟢 營業中</div><div class="store-name">🧋 碼上循環實驗室 (總部)</div><div class="store-location">高科大燕巢校區 管院一樓</div></div>
                <div class="store-card"><div class="store-badge" style="background: #EDF2F7; color: #718096;">🔴 休息中</div><div class="store-name">☕ 循環咖啡 建工特約店</div><div class="store-location">高科大建工校區 咖啡廳</div></div>
            </div>
            <button class="primary-btn" style="background: #2D3748; margin-top: 20px;" onclick="alert('請聯繫高科大碼上循環團隊！')">我是店家，申請加入聯盟</button>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        // ⚠️ 請確保這行是你最新的 Google Apps Script 網址 ⚠️
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbzqnicbJ689GtLMzcmFHXo02zS72Xe8WgSK93kGBR3F8ysDfZ78oLXzSaL96prsNERHAw/exec";
        
        let lastDrawnRewardTitle = "✅ 實驗紀錄";
        let userData = { expCount: 0, carbonSaved: 0, taskTarget: 3, taskProgress: 0, usedCoupons: 0, history: [] };
        let userProfileData = { displayName: "訪客研究員", userId: "guest_" + Date.now() }; 

        function loadData() { let saved = localStorage.getItem("circular_lab_data"); if (saved) userData = JSON.parse(saved); }
        function saveData() { localStorage.setItem("circular_lab_data", JSON.stringify(userData)); }

        const levels = [
            { name: "助理研究員", reqCount: 0, coupons: 0, reward: "首購享10元折扣" }, 
            { name: "研究員", reqCount: 3, coupons: 1, reward: "飲品 95 折 (升級禮)" },
            { name: "副教授", reqCount: 10, coupons: 2, reward: "飲品 9 折 (升級禮)" },
            { name: "首席教授", reqCount: 20, coupons: 5, reward: "隱藏特調免費 (升級禮)" }
        ];

        function updateUI() {
            document.getElementById("exp-count").innerText = userData.expCount;
            document.getElementById("carbon-saved").innerText = userData.carbonSaved;
            document.getElementById("modal-carbon-val").innerHTML = `${userData.carbonSaved} <span>g</span>`;
            
            let currentLevel = levels[0]; let nextLevel = null;
            for (let i = 0; i < levels.length; i++) { if (userData.expCount >= levels[i].reqCount) { currentLevel = levels[i]; nextLevel = levels[i+1] || null; } }

            document.getElementById("member-level").innerText = "🎓 " + currentLevel.name;
            document.getElementById("coupon-count").innerText = Math.max(0, currentLevel.coupons - (userData.usedCoupons || 0));

            const progressBar = document.getElementById("progress-bar");
            const nextLevelTargetText = document.getElementById("next-level-target");
            if (nextLevel) {
                progressBar.style.width = ((userData.expCount / nextLevel.reqCount) * 100) + "%";
                nextLevelTargetText.innerText = `${userData.expCount} / ${nextLevel.reqCount}`;
            } else {
                progressBar.style.width = "100%"; nextLevelTargetText.innerText = "MAX";
            }

            const historyBox = document.getElementById("history-list");
            historyBox.innerHTML = userData.history.length === 0 ? "<div style='font-size:12px; color:#718096;'>目前尚無紀錄</div>" : "";
            userData.history.slice(0, 3).forEach(item => { 
                let colorStyle = (item.action.includes("爆擊") || item.action.includes("奇蹟") || item.action.includes("推廣")) ? "color: #E65100;" : "color: var(--primary-green);";
                historyBox.innerHTML += `<div class="history-item"><div class="history-date">${item.date}</div><div class="history-desc" style="${colorStyle}">${item.action}</div></div>`; 
            });
        }

        // ================= 【殺手鐧功能】呼叫 AI 產生學術報告 =================
        function generateAIReport() {
            if (userData.expCount === 0) {
                alert("您還沒有任何實驗紀錄，快去掃描累積吧！");
                return;
            }
            
            // 打開 AI 視窗並顯示載入中
            document.getElementById("ai-report-content").innerHTML = "🔍 Gemini AI 正在翻閱您的《碼上循環科學期刊》...<br>請稍候約 3~5 秒。";
            openModal('ai-modal');

            // 將資料傳給你的 Google Apps Script (它會去打 Gemini API)
            let payload = { 
                type: "generate_ai_report", 
                uid: userProfileData.userId, 
                name: userProfileData.displayName, 
                exp: userData.expCount, 
                carbon: userData.carbonSaved, 
                history: userData.history 
            };

            fetch(GOOGLE_API_URL, { 
                method: "POST", 
                headers: { "Content-Type": "text/plain;charset=utf-8" }, 
                body: JSON.stringify(payload) 
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById("ai-report-content").innerHTML = data.report.replace(/\n/g, '<br>');
                } else {
                    document.getElementById("ai-report-content").innerHTML = "⚠️ 呼叫 AI 失敗，請確認後端 API Key 設置。";
                }
            })
            .catch(e => {
                console.error(e);
                document.getElementById("ai-report-content").innerHTML = "⚠️ 網路連線異常，AI 教授暫時失聯。";
            });
        }
        // ======================================================================

        function openModal(id) { 
            if(id === 'exp-modal') generateExpTable();
            if(id === 'coupon-modal') generateCoupons();
            document.getElementById(id).style.display = 'flex'; 
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function generateCoupons() {
            let currentLevel = levels[0];
            for(let i=0; i<levels.length; i++) { if(userData.expCount >= levels[i].reqCount) currentLevel = levels[i]; }
            let availableCoupons = Math.max(0, currentLevel.coupons - (userData.usedCoupons || 0));
            const listUI = document.getElementById("coupon-list-ui");
            if (availableCoupons > 0) {
                let cards = "";
                for(let c=0; c < availableCoupons; c++) { cards += `<div class="coupon-card"><div><div class="coupon-name">💎 ${currentLevel.name} 升級禮</div><div class="coupon-desc">${currentLevel.reward}</div></div><button class="coupon-use-btn" onclick="closeModal('coupon-modal'); openModal('verify-modal');">立即使用</button></div>`; }
                listUI.innerHTML = `<div class="coupon-list">${cards}</div>`;
            } else {
                listUI.innerHTML = `<div class="coupon-empty">目前票夾空空如也</div>`;
            }
        }

        function confirmVerification() {
            let pinInput = document.getElementById("store-pin").value;
            if (pinInput === "8888") {
                userData.usedCoupons = (userData.usedCoupons || 0) + 1;
                const dateStr = new Date().toLocaleString();
                userData.history.unshift({ date: dateStr, action: `[核銷] 使用了一張升級特權券` });
                saveData(); updateUI(); syncToCloud();
                closeModal('verify-modal');
                alert("✅ 核銷成功！");
            } else { alert("⚠️ 密碼錯誤！"); document.getElementById("store-pin").value = ""; }
        }

        function generateExpTable() {
            let html = ""; let currentLevelReached = 0;
            for(let i=0; i<levels.length; i++) { if(userData.expCount >= levels[i].reqCount) currentLevelReached = i; }
            levels.forEach((lvl, index) => {
                let isActive = index === currentLevelReached ? 'active' : ''; let isDone = index < currentLevelReached ? '✅' : '🔒'; if(index === currentLevelReached) isDone = '⭐';
                html += `<div class="rank-item ${isActive}"><div style="font-size:20px; width: 30px; text-align:center;">${isDone}</div><div class="rank-info"><div class="rank-name">${lvl.name} <span class="rank-req">(${lvl.reqCount} 次)</span></div><div style="font-size:12px; color:var(--primary-green);">解鎖：${lvl.reward}</div></div></div>`;
            });
            document.getElementById("rank-list-ui").innerHTML = html;
        }

        async function main() {
            loadData(); 
            try {
                await liff.init({ liffId: "2009660466-OkU0MklB" }); 
                if (liff.isLoggedIn()) {
                    userProfileData = await liff.getProfile();
                    document.getElementById("profile-picture").src = userProfileData.pictureUrl;
                    document.getElementById("profile-picture").style.display = "block";
                    document.getElementById("profile-name").innerText = userProfileData.displayName;
                    document.getElementById("loading-overlay").style.display = "none";
                    updateUI();
                } else { liff.login(); }
            } catch (err) {
                document.getElementById("loading-overlay").style.display = "none";
                updateUI();
            }
        }

        function syncToCloud() {
            let payload = { type: "sync_data", uid: userProfileData.userId, name: userProfileData.displayName, exp: userData.expCount, carbon: userData.carbonSaved, history: userData.history };
            fetch(GOOGLE_API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) });
        }

        function getGachaReward() {
            let r = Math.random();
            if (r < 0.05) return { exp: 5, carbon: 800, title: "🔥 完美爆擊！", icon: "🚀", msg: "手氣發燙！達成超高難度萃取！", color: "#DD6B20" };
            if (r < 0.20) return { exp: 3, carbon: 500, title: "🔮 基因突破！", icon: "✨", msg: "實驗發生神奇變化！", color: "#805AD5" };
            return { exp: 1, carbon: 150, title: "✅ 實驗紀錄成功", icon: "🌱", msg: "穩紮穩打的標準操作！", color: "#2C7A4B" };
        }

        let html5QrCode;
        document.getElementById("manual-scan-btn").addEventListener("click", () => {
            document.getElementById("scanner-modal").style.display = "flex";
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).catch(e => { alert("相機權限異常"); closeScanner(); });
        });

        function onScanSuccess(decodedText) {
            closeScanner();
            let reward = getGachaReward();
            userData.expCount += reward.exp; userData.carbonSaved += reward.carbon;
            userData.history.unshift({ date: new Date().toLocaleString(), action: `[紀錄] 獲得 ${reward.carbon}g` });
            saveData(); updateUI(); syncToCloud();
            
            document.getElementById("result-icon").innerText = reward.icon;
            document.getElementById("result-title").innerText = reward.title;
            document.getElementById("result-title").style.color = reward.color;
            document.getElementById("result-desc").innerHTML = reward.msg;
            openModal("result-modal");
        }

        function closeScanner() {
            if(html5QrCode) html5QrCode.stop().then(() => html5QrCode.clear()).catch(e => {});
            document.getElementById("scanner-modal").style.display = "none";
        }

        function shareToLine() {
            if (!liff.isLoggedIn()) return;
            liff.shareTargetPicker([ { "type": "text", "text": "🌱 我在碼上循環實驗室總共減少了 " + userData.carbonSaved + "g 的碳排🌍\n👉 點擊開始你的永續實驗：https://liff.line.me/2009660466-OkU0MklB" } ])
            .then(function (res) {
                if (res) {
                    userData.expCount += 1; userData.carbonSaved += 50;
                    userData.history.unshift({ date: new Date().toLocaleString(), action: `[推廣] 獲得 50g` });
                    saveData(); updateUI(); syncToCloud();
                    alert("✅ 推廣成功！獲得 50g 與 1 EXP");
                }
            });
        }

        main();
    </script>
</body>
</html>
