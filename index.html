<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circular Impact | 碼上循環實驗室</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script> <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* 套用之前討論的深綠色與專業卡片設計 */
        :root { --primary: #195840; --primary-gradient: linear-gradient(135deg, #1F5F46, #348E66); --bg: #F4F7F6; --card: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: var(--bg); display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; min-height: 100vh; padding-bottom: 50px; }
        
        /* 掃描區塊優化 */
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: none !important; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .stat-box { text-align: center; padding: 15px; background: #f8faf9; border-radius: 15px; cursor: pointer; transition: 0.2s; }
        .stat-box:active { background: #e0eee8; }
        .header { padding: 20px; background: white; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: #eee; border: 2px solid var(--primary); }
        .btn-scan { width: 90%; margin: 20px 5%; padding: 18px; border-radius: 100px; border: none; font-size: 18px; font-weight: 900; color: white; background: var(--primary-gradient); cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img id="userPicture" src="" class="avatar">
        <div>
            <div id="userName" style="font-weight: 700; font-size: 18px;">載入中...</div>
            <div style="font-size: 12px; color: var(--primary);">✨ 首席研究員</div>
        </div>
    </div>

    <div id="reader" style="margin: 15px;"></div>

    <div class="card">
        <h3 style="margin-bottom: 15px;">循環數據報告</h3>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
            <div class="stat-box" onclick="alert('數據基準：環境部 45g/杯 規範')">
                <div id="carbonVal" style="font-weight: 900; color: var(--primary); font-size: 18px;">0g</div>
                <div style="font-size: 11px; color: #666;">累積減碳</div>
            </div>
            <div class="stat-box">
                <div id="cycleVal" style="font-weight: 900; color: var(--primary); font-size: 18px;">0次</div>
                <div style="font-size: 11px; color: #666;">高效循環</div>
            </div>
            <div class="stat-box">
                <div style="font-weight: 900; color: var(--primary); font-size: 18px;">2張</div>
                <div style="font-size: 11px; color: #666;">可用回饋</div>
            </div>
        </div>
    </div>

    <button class="btn-scan" onclick="startScan()">📷 啟動精準掃描</button>

    <div style="padding: 0 15px;">
        <h4 style="margin-bottom: 10px;">實驗室精選成果</h4>
        <img src="S__309493767_0.jpg" style="width: 100%; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <img src="S__309493768_0.jpg" style="width: 100%; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    </div>
</div>

<script>
    const GAS_URL = "你的_GAS_網址"; // <--- 填入你的 Apps Script 網址

    async function initializeLiff() {
        await liff.init({ liffId: "你的_LIFF_ID" });
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            const profile = await liff.getProfile();
            document.getElementById('userName').innerText = profile.displayName;
            document.getElementById('userPicture').src = profile.pictureUrl;
            fetchBackendData(profile.userId);
        }
    }

    async function fetchBackendData(uid) {
        try {
            const resp = await fetch(`${GAS_URL}?uid=${uid}`);
            const result = await resp.json();
            if (result.status === "success") {
                document.getElementById('carbonVal').innerText = result.data.carbon + "g";
                document.getElementById('cycleVal').innerText = result.data.cycle + "次";
            }
        } catch (e) { console.error("後端連線失敗", e); }
    }

    // 精準掃描器初始化
    function startScan() {
        document.getElementById('reader').style.display = 'block';
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } },
            (decodedText) => {
                alert("掃描成功！內容：" + decodedText);
                html5QrCode.stop();
                document.getElementById('reader').style.display = 'none';
                // 這裡可以寫掃描後的邏輯，例如傳送數據給 Excel
            },
            (errorMessage) => { /* 掃描中... */ }
        ).catch(err => alert("相機啟動失敗：" + err));
    }

    window.onload = initializeLiff;
</script>
</body>
</html>
