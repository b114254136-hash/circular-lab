<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>循環數據平台 | 碼上循環實驗室</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #195840;     
            --primary-gradient: linear-gradient(135deg, #1F5F46, #348E66);
            --primary-light: #E8F5E9;
            --secondary: #4CAF50;   
            --bg: #F4F7F6;          
            --card: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; }

        .app-container { width: 100%; max-width: 480px; min-height: 100vh; background-color: var(--bg); padding-bottom: 80px; position: relative; }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .header-title { font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }

        .content { padding: 20px; }

        /* Profile Area */
        .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar { 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid white; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background-color: #ddd; /* 載入前的底色 */
        }
        .user-info .name { font-size: 20px; font-weight: 700; }
        .user-info .level { font-size: 12px; color: var(--primary); background: var(--primary-light); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-top: 5px; font-weight: 700; border: 1px solid #C8E6C9; }

        /* Impact Banner */
        .impact-banner { background: var(--primary-gradient); color: white; border-radius: 16px; padding: 18px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 20px rgba(31, 95, 70, 0.2); }
        .impact-banner h3 { font-size: 22px; margin-top: 5px; font-weight: 900; }

        /* Stats Card */
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(229, 231, 235, 0.5); }
        .section-title { font-size: 17px; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-box { text-align: center; padding: 15px 8px; background: #F9FAFB; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; }
        .stat-value { font-size: 18px; font-weight: 900; color: var(--primary); margin-bottom: 4px; }
        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        /* Scan Button */
        .scan-action-area { margin: 25px 0; text-align: center; }
        .btn-scan {
            width: 90%;
            padding: 18px;
            border-radius: 100px;
            border: none;
            font-size: 18px;
            font-weight: 900;
            color: white;
            background: var(--primary-gradient);
            box-shadow: 0 10px 25px rgba(31, 95, 70, 0.3);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        /* Horizontal Scroll Products */
        .horizontal-scroll { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .product-card { min-width: 240px; background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .product-img { width: 100%; height: 140px; object-fit: cover; }
        .product-info { padding: 12px; }
        .product-title { font-size: 15px; font-weight: 700; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-width: 480px; border-radius: 24px 24px 0 0; padding: 25px; transform: translateY(100%); transition: transform 0.3s ease-out; }
        .modal-overlay.active { display: flex; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .data-list { list-style: none; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;}
        .data-list li { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-title">🧪 碼上循環實驗室</div>
    </div>

    <div class="content">
        <div class="profile-header">
            <img id="userPicture" src="https://via.placeholder.com/150" alt="用戶頭像" class="avatar">
            <div class="user-info">
                <div id="userName" class="name">載入中...</div>
                <div class="level">✨ 助理研究員 (Lv.2)</div>
            </div>
        </div>

        <div class="impact-banner">
            <span>您的永續行動，已相當於</span>
            <h3>🌳 2.5 棵樹一天的碳吸收量</h3>
        </div>

        <div class="card">
            <div class="section-title">循環數據總覽</div>
            <div class="stats-grid">
                <div class="stat-box" onclick="openModal('carbon')">
                    <div class="stat-value">580g</div>
                    <div class="stat-label">累積減碳量</div>
                </div>
                <div class="stat-box" onclick="openModal('cycle')">
                    <div class="stat-value">12次</div>
                    <div class="stat-label">高效循環</div>
                </div>
                <div class="stat-box" onclick="openModal('reward')">
                    <div class="stat-value">2張</div>
                    <div class="stat-label">可用回饋</div>
                </div>
            </div>
        </div>

        <div class="scan-action-area">
            <button class="btn-scan" onclick="liff.scanCodeV2().then(result => alert('掃描結果：' + result.value))">
                📷 掃描容器，紀錄循環
            </button>
        </div>

        <div class="card" style="border:none; padding:0; background:transparent; box-shadow:none;">
            <div class="section-title">實驗室精選成果</div>
            <div class="horizontal-scroll">
                <div class="product-card">
                    <img src="S__309493767_0.jpg" alt="工作坊" class="product-img">
                    <div class="product-info"><div class="product-title">科學再生實驗工作坊</div></div>
                </div>
                <div class="product-card">
                    <img src="S__309493768_0.jpg" alt="培養杯" class="product-img">
                    <div class="product-info"><div class="product-title">醜果能量培養杯</div></div>
                </div>
                <div class="product-card">
                    <img src="S__309493766_0.jpg" alt="培養皿" class="product-img">
                    <div class="product-info"><div class="product-title">醜果多樣 DIY 培養皿</div></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="dataModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-inner-content"></div>
    </div>
</div>

<script>
    // --- 關鍵：LIFF 初始化邏輯 ---
    async function initializeLiff() {
        try {
            await liff.init({ liffId: "你的_LIFF_ID" }); // 這裡要換成你在 LINE Developers 後台申請的 ID
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                document.getElementById('userName').innerText = profile.displayName;
                document.getElementById('userPicture').src = profile.pictureUrl;
            }
        } catch (err) {
            console.log('LIFF 初始化失敗', err);
            document.getElementById('userName').innerText = "訪客用戶";
        }
    }

    window.onload = initializeLiff;

    // --- Modal 邏輯 ---
    const modalData = {
        carbon: { title: "🌍 減碳報表", desc: "依據環境部標準，您減少了 12 個塑膠杯排放。" },
        cycle: { title: "♻️ 循環紀錄", desc: "本月共計完成 12 次有效回收行為。" },
        reward: { title: "🎁 我的回饋", desc: "您目前擁有 2 張折扣券可使用。" }
    };

    function openModal(type) {
        const data = modalData[type];
        document.getElementById('modal-inner-content').innerHTML = `
            <h2 style="color:var(--primary)">${data.title}</h2>
            <p style="margin:15px 0; color:var(--text-muted)">${data.desc}</p>
            <button onclick="closeModal()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px;">關閉</button>
        `;
        document.getElementById('dataModal').classList.add('active');
    }

    function closeModal() { document.getElementById('dataModal').classList.remove('active'); }
</script>

</body>
</html>
